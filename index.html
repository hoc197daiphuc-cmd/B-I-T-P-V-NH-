<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WebAR Mô Hình 3D Đầu Ngựa</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  <body style="margin: 0px; overflow: hidden;">
    <a-scene embedded vr-mode-ui="enabled: false" arjs="sourceType: webcam; debugUIEnabled: false;">
      
      <a-assets>
        <a-asset-item id="flower-obj" src="flower.obj"></a-asset-item>
        <a-asset-item id="flower-mtl" src="flower.mtl"></a-asset-item>
    </a-assets>

    <a-marker preset="hiro">
        <a-obj-model src="#flower-obj" mtl="#flower-mtl" position="0 0.5 0" scale="0.05 0.05 0.05" rotation="0 0 0"></a-obj-model>
    </a-marker>

      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>

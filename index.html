<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WebAR - Cay Phong</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  <body style="margin: 0px; overflow: hidden;">
<a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
  <a-assets>
    <a-asset-item id="stem-obj" src="MapleTreeStem.obj"></a-asset-item>
    <a-asset-item id="leaves-obj" src="MapleTreeLeaves.obj"></a-asset-item>
    <img id="bark-img" src="maple_bark.png">
    <img id="leaf-img" src="maple_leaf.png">
  </a-assets>

  <a-marker preset="hiro">
    <a-obj-model src="#stem-obj" material="src: #bark-img" scale="0.02 0.02 0.02"></a-obj-model>
    <a-obj-model src="#leaves-obj" material="src: #leaf-img; alphaTest: 0.5" scale="0.02 0.02 0.02"></a-obj-model>
  </a-marker>
  
  <a-entity camera></a-entity>
</a-scene>
  </body>
</html>
